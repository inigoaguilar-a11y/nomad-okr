<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NO.MAD — OKR Dashboard</title>
  <style>
    /* ── TOKENS ─────────────────────────────────────── */
    :root {
      --black:   #0A0A0A;
      --white:   #F5F4F0;
      --mid:     #1A1A1A;
      --line:    #2A2A2A;
      --muted:   #A0A8B8;
      --accent:  #7EC8E3;   /* light blue — signal colour */
      --warn:    #FF6B35;
      --ok:      #7EC8E3;
      --risk:    #FF4444;
      --neutral: #C4CAD6;

      --font-display: 'Aptos Display', 'Aptos', 'Segoe UI', Arial, sans-serif;
      --font-body:    'Aptos', 'Segoe UI', Arial, sans-serif;

      --r: 4px;
      --gap: 24px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.55;
      min-height: 100vh;
    }

    /* ── LAYOUT ─────────────────────────────────────── */
    .shell {
      max-width: 1320px;
      margin: 0 auto;
      padding: 0 var(--gap);
    }

    /* ── HEADER ─────────────────────────────────────── */
    header {
      border-bottom: 1px solid var(--line);
      padding: 20px 0;
      position: sticky;
      top: 0;
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(12px);
      z-index: 100;
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo img {
      height: 34px;
      width: auto;
      display: block;
      object-fit: contain;
    }

    .logo .logo-tag {
      font-family: var(--font-display);
      font-size: 12px;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      padding-left: 10px;
      border-left: 1px solid var(--line);
    }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .quarter-badge {
      font-family: var(--font-display);
      font-size: 11px;
      letter-spacing: 0.12em;
      color: var(--muted);
      border: 1px solid var(--line);
      padding: 4px 10px;
      border-radius: var(--r);
    }

    #clock {
      font-family: var(--font-display);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .sync-indicator {
      font-family: var(--font-display);
      font-size: 10px;
      letter-spacing: 0.06em;
      color: var(--muted);
      transition: color 0.3s;
    }

    /* ── HERO STRIP ─────────────────────────────────── */
    .hero {
      padding: 48px 0 36px;
      border-bottom: 1px solid var(--line);
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: var(--gap);
      align-items: end;
    }

    .hero h1 {
      font-family: var(--font-display);
      font-size: clamp(28px, 4vw, 48px);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    .hero h1 em {
      font-style: normal;
      color: var(--accent);
    }

    .hero-sub {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
      max-width: 480px;
    }

    .global-score {
      text-align: right;
    }

    .global-score .score-num {
      font-family: var(--font-display);
      font-size: 56px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
    }

    .global-score .score-label {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* ── SUMMARY BAR ────────────────────────────────── */
    .summary-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border-bottom: 1px solid var(--line);
    }

    .summary-cell {
      padding: 20px var(--gap);
      border-right: 1px solid var(--line);
      cursor: pointer;
      transition: background 0.15s;
    }

    .summary-cell:last-child { border-right: none; }
    .summary-cell:hover { background: var(--mid); }
    .summary-cell.active { background: var(--mid); border-bottom: 2px solid var(--accent); }

    .cell-area {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .cell-owner {
      font-size: 12px;
      color: var(--neutral);
      margin-bottom: 10px;
    }

    .cell-progress {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .progress-bar {
      flex: 1;
      height: 3px;
      background: var(--line);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width 0.6s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .progress-fill.warn { background: var(--warn); }
    .progress-fill.risk { background: var(--risk); }

    .progress-pct {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 700;
      min-width: 36px;
      text-align: right;
    }

    /* ── MAIN GRID ──────────────────────────────────── */
    .main {
      padding: 40px 0 80px;
    }

    .areas-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--gap);
    }

    /* ── AREA CARD ──────────────────────────────────── */
    .area-card {
      border: 1px solid var(--line);
      border-radius: var(--r);
      overflow: hidden;
    }

    .area-card:nth-child(1) { --card-accent: #7EC8E3; } /* azul — equipo */
    .area-card:nth-child(2) { --card-accent: #A78BFA; } /* violeta — proyectos */
    .area-card:nth-child(3) { --card-accent: #34D399; } /* verde esmeralda — rentabilidad */
    .area-card:nth-child(4) { --card-accent: #F472B6; } /* rosa — negocio */

    .area-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      background: var(--mid);
      border-left: 3px solid var(--card-accent, var(--accent));
    }

    .area-title-group { display: flex; flex-direction: column; gap: 2px; }

    .area-index {
      font-family: var(--font-display);
      font-size: 10px;
      color: var(--card-accent, var(--muted));
      letter-spacing: 0.15em;
    }

    .area-name {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--white);
    }

    .area-owner-chip {
      font-size: 11px;
      padding: 3px 10px;
      border: 1px solid var(--card-accent, var(--line));
      border-radius: 99px;
      color: var(--card-accent, var(--muted));
      background: rgba(255,255,255,0.04);
    }

    /* Objective row */
    .objective {
      padding: 14px 20px;
      border-bottom: 1px solid var(--line);
      background: rgba(126,200,227,0.04);
      border-left: 3px solid transparent;
    }

    .area-card:nth-child(1) .objective { background: rgba(126,200,227,0.05); border-left-color: rgba(126,200,227,0.3); }
    .area-card:nth-child(2) .objective { background: rgba(167,139,250,0.05); border-left-color: rgba(167,139,250,0.3); }
    .area-card:nth-child(3) .objective { background: rgba(52,211,153,0.05);  border-left-color: rgba(52,211,153,0.3);  }
    .area-card:nth-child(4) .objective { background: rgba(244,114,182,0.05); border-left-color: rgba(244,114,182,0.3); }

    .objective-label {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--card-accent, var(--accent));
      margin-bottom: 4px;
    }

    .objective-text {
      font-size: 13px;
      font-weight: 500;
      color: var(--white);
    }

    /* KR list */
    .kr-list { padding: 8px 0; }

    .kr-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: start;
      padding: 14px 20px;
      border-bottom: 1px solid var(--line);
      transition: background 0.12s;
    }

    .kr-item:last-child { border-bottom: none; }
    .kr-item:hover { background: rgba(255,255,255,0.02); }

    .kr-left { display: flex; flex-direction: column; gap: 6px; }

    .kr-id {
      font-family: var(--font-display);
      font-size: 10px;
      color: var(--card-accent, var(--muted));
      letter-spacing: 0.08em;
    }

    .kr-text {
      font-size: 13px;
      line-height: 1.45;
      color: rgba(245,244,240,0.85);
    }

    .kr-track {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
    }

    .kr-bar {
      width: 80px;
      height: 2px;
      background: var(--line);
      border-radius: 99px;
      overflow: hidden;
    }

    .kr-bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.5s ease;
    }

    .kr-bar-fill.green  { background: var(--ok); }
    .kr-bar-fill.amber  { background: var(--warn); }
    .kr-bar-fill.red    { background: var(--risk); }
    .kr-bar-fill.grey   { background: var(--neutral); }

    .kr-pct {
      font-family: var(--font-display);
      font-size: 11px;
      color: var(--muted);
    }

    .kr-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      padding-top: 2px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.green  { background: var(--ok); box-shadow: 0 0 6px var(--ok); }
    .status-dot.amber  { background: var(--warn); box-shadow: 0 0 6px var(--warn); }
    .status-dot.red    { background: var(--risk); box-shadow: 0 0 6px var(--risk); }
    .status-dot.grey   { background: var(--neutral); }

    .kr-edit-btn {
      font-size: 10px;
      font-family: var(--font-display);
      color: var(--muted);
      background: none;
      border: 1px solid var(--line);
      padding: 3px 8px;
      border-radius: var(--r);
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: border-color 0.15s, color 0.15s;
    }

    .kr-edit-btn:hover { border-color: var(--accent); color: var(--accent); }

    .kr-hint {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.4;
      border-left: 2px solid var(--line);
      padding-left: 8px;
      margin-top: 1px;
    }

    /* ── CARD FOOTER ─────────────────────────────────── */
    .area-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: var(--mid);
      border-top: 1px solid var(--line);
    }

    .footer-update {
      font-size: 11px;
      color: var(--muted);
    }

    .add-note-btn {
      font-size: 11px;
      font-family: var(--font-display);
      color: var(--muted);
      background: none;
      border: 1px solid var(--line);
      padding: 4px 12px;
      border-radius: var(--r);
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: border-color 0.15s, color 0.15s;
    }

    .add-note-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── MODAL ──────────────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: var(--gap);
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--mid);
      border: 1px solid var(--line);
      border-radius: var(--r);
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      padding: 0;
      overflow: hidden;
    }

    .modal-header {
      padding: 24px 28px 16px;
      flex-shrink: 0;
    }

    .modal-body {
      padding: 0 28px 8px;
      overflow-y: auto;
      flex: 1;
    }

    .modal-footer {
      padding: 16px 28px 24px;
      border-top: 1px solid var(--line);
      flex-shrink: 0;
    }

    .modal h3 {
      font-family: var(--font-display);
      font-size: 14px;
      letter-spacing: 0.08em;
      margin-bottom: 20px;
      color: var(--accent);
    }

    .field { margin-bottom: 16px; }

    .field label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      background: var(--black);
      border: 1px solid var(--line);
      border-radius: var(--r);
      color: var(--white);
      font-family: var(--font-body);
      font-size: 14px;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.15s;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus { border-color: var(--accent); }

    .field textarea { resize: vertical; min-height: 80px; }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .btn-cancel {
      background: none;
      border: 1px solid var(--line);
      color: var(--muted);
      padding: 8px 20px;
      border-radius: var(--r);
      font-family: var(--font-display);
      font-size: 12px;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .btn-cancel:hover { border-color: var(--white); }

    .btn-save {
      background: var(--accent);
      border: none;
      color: var(--black);
      padding: 8px 20px;
      border-radius: var(--r);
      font-family: var(--font-display);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn-save:hover { opacity: 0.85; }

    .modal-hint {
      font-size: 12px;
      color: var(--muted);
      border-left: 2px solid var(--line);
      padding-left: 10px;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .score-selector {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .score-btn {
      width: 36px;
      height: 36px;
      background: var(--black);
      border: 1px solid var(--line);
      border-radius: var(--r);
      color: var(--muted);
      font-family: var(--font-display);
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }

    .score-btn:hover { border-color: var(--accent); color: var(--accent); }

    .score-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--black);
      font-weight: 700;
    }

    .score-result {
      min-height: 20px;
      margin-top: 4px;
      margin-bottom: 8px;
    }

    /* ranking options */
    .ranking-option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: var(--black);
      border: 1px solid var(--line);
      border-radius: var(--r);
      margin-bottom: 6px;
      cursor: pointer;
      transition: border-color 0.12s, background 0.12s;
    }

    .ranking-option:hover { border-color: var(--muted); }

    .ranking-option.active.best  { border-color: #34D399; background: rgba(52,211,153,0.08); }
    .ranking-option.active.mid   { border-color: var(--warn); background: rgba(255,107,53,0.08); }
    .ranking-option.active.worst { border-color: var(--risk); background: rgba(255,68,68,0.08); }

    .ranking-label { font-size: 13px; color: var(--white); }
    .ranking-check { font-size: 14px; opacity: 0; transition: opacity 0.12s; }
    .ranking-option.active .ranking-check { opacity: 1; }

    /* grouped yesno */
    .group-section { margin-bottom: 14px; }

    .group-title {
      font-family: var(--font-display);
      font-size: 10px;
      letter-spacing: 0.12em;
      color: var(--accent);
      padding: 6px 0 8px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 8px;
    }

    .group-ranking-block { margin-bottom: 16px; }
    .group-ranking-label {
      font-size: 13px;
      color: var(--white);
      font-weight: 500;
      margin-bottom: 8px;
    }

    .grouped-yesno-header {
      font-size: 13px;
      color: var(--white);
      font-weight: 500;
      margin-bottom: 14px;
      padding: 10px 12px;
      background: rgba(126,200,227,0.06);
      border-left: 2px solid var(--accent);
      border-radius: var(--r);
    }

    /* checklist & yesno rows */
    .check-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      background: var(--black);
      border: 1px solid var(--line);
      border-radius: var(--r);
      margin-bottom: 6px;
    }

    .check-label { font-size: 13px; color: var(--white); }
    .check-person { font-size: 11px; color: var(--muted); font-style: italic; }

    .check-toggle {
      display: flex;
      gap: 4px;
    }

    .toggle-btn {
      padding: 3px 10px;
      font-size: 11px;
      font-family: var(--font-display);
      border-radius: var(--r);
      cursor: pointer;
      border: 1px solid var(--line);
      background: none;
      color: var(--muted);
      transition: background 0.12s, color 0.12s, border-color 0.12s;
    }

    .toggle-btn.yes.active  { background: rgba(52,211,153,0.15); border-color: #34D399; color: #34D399; }
    .toggle-btn.no.active   { background: rgba(255,68,68,0.15);  border-color: var(--risk); color: var(--risk); }
    .toggle-btn:hover       { border-color: var(--white); color: var(--white); }

    /* ── NOTES PANEL ────────────────────────────────── */
    .notes-panel {
      display: none;
      padding: 16px 20px;
      border-top: 1px solid var(--line);
      background: rgba(0,0,0,0.2);
    }

    .notes-panel.open { display: block; }

    .note-entry {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      font-size: 13px;
    }

    .note-ts {
      font-family: var(--font-display);
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
      padding-top: 2px;
      min-width: 80px;
    }

    .note-text { color: rgba(245,244,240,0.75); }

    /* ── SIGNALS STRIP ──────────────────────────────── */
    .signals {
      margin-top: var(--gap);
      border: 1px solid var(--line);
      border-radius: var(--r);
      overflow: hidden;
    }

    .signals-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 20px;
      background: var(--mid);
      border-bottom: 1px solid var(--line);
    }

    .signals-header span {
      font-family: var(--font-display);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .pulse {
      width: 8px; height: 8px;
      background: var(--warn);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,107,53,0.6); }
      50%       { box-shadow: 0 0 0 6px rgba(255,107,53,0); }
    }

    .signal-list { padding: 8px 0; }

    .signal-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 20px;
      font-size: 13px;
    }

    .signal-icon { font-size: 14px; margin-top: 1px; }
    .signal-text { color: rgba(245,244,240,0.8); line-height: 1.45; }
    .signal-text strong { color: var(--white); }

    /* ── RESPONSIVE ─────────────────────────────────── */
    @media (max-width: 900px) {
      .areas-grid { grid-template-columns: 1fr; }
      .summary-bar { grid-template-columns: repeat(2, 1fr); }
      .summary-cell:nth-child(2) { border-right: none; }
      .summary-cell:nth-child(3) { border-top: 1px solid var(--line); }
      .summary-cell:nth-child(4) { border-top: 1px solid var(--line); border-right: none; }
      .hero-grid { grid-template-columns: 1fr; }
      .global-score { text-align: left; }
    }

    @media (max-width: 560px) {
      .summary-bar { grid-template-columns: 1fr; }
      .summary-cell { border-right: none !important; border-top: 1px solid var(--line); }
      .summary-cell:first-child { border-top: none; }
    }
  </style>

      projectId: "nomad-okr",
      storageBucket: "nomad-okr.firebasestorage.app",
      messagingSenderId: "938753503490",

function mergeData(saved, defaults) {
  // Merge top-level fields
  const result = { ...defaults, ...saved };
  // Merge areas by id
  result.areas = defaults.areas.map(defArea => {
    const savedArea = (saved.areas || []).find(a => a.id === defArea.id);
    if (!savedArea) return JSON.parse(JSON.stringify(defArea));
    const mergedArea = { ...defArea, ...savedArea };
    // Merge KRs by id
    mergedArea.krs = defArea.krs.map(defKr => {
      const savedKr = (savedArea.krs || []).find(k => k.id === defKr.id);
      if (!savedKr) return JSON.parse(JSON.stringify(defKr));
      // Keep saved runtime values (progress, status, notes, value, selected, valueA, valueB)
      // but always use DEFAULT_DATA for structural fields (text, hint, inputType, items, groups, options, target)
      return {
        ...defKr,                          // structure always from defaults
        progress:  savedKr.progress  ?? defKr.progress,
        status:    savedKr.status    ?? defKr.status,
        notes:     savedKr.notes     ?? [],
        value:     savedKr.value     ?? defKr.value     ?? null,
        selected:  savedKr.selected  ?? defKr.selected  ?? null,
        valueA:    savedKr.valueA    ?? defKr.valueA    ?? null,
        valueB:    savedKr.valueB    ?? defKr.valueB    ?? null,
        // For checklist items: preserve checked state
        items: defKr.items ? defKr.items.map((defItem, i) => {
          const savedItem = savedKr.items?.[i];
          return savedItem ? { ...defItem, checked: savedItem.checked ?? defItem.checked, value: savedItem.value ?? defItem.value } : defItem;
        }) : undefined,
        // For grouped_yesno / grouped_ranking groups: preserve values
        groups: defKr.groups ? defKr.groups.map((defGroup, gi) => {
          const savedGroup = savedKr.groups?.[gi];
          if (!savedGroup) return defGroup;
          if (defGroup.items) {
            // grouped_yesno shape
            return {
              ...defGroup,
              items: defGroup.items.map((defItem, ii) => {
                const savedItem = savedGroup.items?.[ii];
                return savedItem ? { ...defItem, value: savedItem.value ?? defItem.value } : defItem;
              }),
            };
          }
          // grouped_ranking shape
          return { ...defGroup, selected: savedGroup.selected ?? defGroup.selected ?? null };
        }) : undefined,
      };
    });
    return mergedArea;
  });
  return result;
}

// ─── REMOTE SYNC STATE ────────────────────────────
let DATA = JSON.parse(JSON.stringify(DEFAULT_DATA));
let _firebaseReady = false;
let _lastWrittenJSON = null; // used to ignore the immediate echo of our own write

function loadLocalCache() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch { return null; }
}

function cacheLocally(d) {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(d)); } catch {}
}

// Apply data (from cloud or local cache) on top of DEFAULT_DATA structure
function applyIncomingData(saved) {
  DATA = mergeData(saved, JSON.parse(JSON.stringify(DEFAULT_DATA)));
  cacheLocally(DATA);
  render();
}

async function saveData(d) {
  DATA = d;
  cacheLocally(d);
  render();
  if (!_firebaseReady) { updateSyncIndicator('offline'); return; }
  try {
    updateSyncIndicator('syncing');
    _lastWrittenJSON = JSON.stringify(d);
    await window.__firebase.setDoc(window.__firebase.docRef, d);
    updateSyncIndicator('synced');
  } catch (err) {
    console.error('Firestore write failed:', err);
    updateSyncIndicator('error');
  }
}

function updateSyncIndicator(state) {
  const el = document.getElementById('syncIndicator');
  if (!el) return;
  const map = {
    synced:   { text: '● Sincronizado',  color: '#34D399' },
    syncing:  { text: '◐ Sincronizando', color: 'var(--warn)' },
    offline:  { text: '○ Sin conexión (local)', color: 'var(--muted)' },
    error:    { text: '⚠ Error de sincronización', color: 'var(--risk)' },
  };
  const s = map[state] || map.offline;
  el.textContent = s.text;
  el.style.color = s.color;
}

async function initFirebaseSync() {
  // 1. Show local cache immediately (fast paint, works offline)
  const cached = loadLocalCache();
  if (cached) applyIncomingData(cached);
  else render();

  try {
    const fb = window.__firebase;
    updateSyncIndicator('syncing');

    // 2. Subscribe to real-time updates — this single listener is the source of truth.
    //    Firestore fires it immediately with the current server state, then again
    //    on every future change from any device. No separate getDoc/setDoc seed step,
    //    to avoid race conditions when multiple tabs open at the same time.
    let isFirstSnapshot = true;
    fb.onSnapshot(fb.docRef, async (snap) => {
      if (snap.exists()) {
        const incomingJSON = JSON.stringify(snap.data());
        // Ignore only the exact echo of what we just wrote ourselves
        if (incomingJSON === _lastWrittenJSON) {
          _lastWrittenJSON = null;
        } else {
          applyIncomingData(snap.data());
        }
        _firebaseReady = true;
        updateSyncIndicator('synced');
      } else if (isFirstSnapshot) {
        // No doc yet in Firestore at all — seed it once with current data
        await fb.setDoc(fb.docRef, DATA);
        _firebaseReady = true;
        updateSyncIndicator('synced');
      }
      isFirstSnapshot = false;
    }, (err) => {
      console.error('Firestore listener error:', err);
      _firebaseReady = false;
      updateSyncIndicator('error');
    });
  } catch (err) {
    console.error('Firebase init failed, working offline:', err);
    _firebaseReady = false;
    updateSyncIndicator('offline');
  }
}

// ─── HELPERS ─────────────────────────────────────
function areaProgress(area) {
  const vals = area.krs.map(k => k.progress);
  return Math.round(vals.reduce((a,b) => a+b, 0) / vals.length);
}

function globalProgress() {
  const areas = DATA.areas;
  return Math.round(areas.reduce((s,a) => s + areaProgress(a), 0) / areas.length);
}

function statusColor(s) {
  return { green: '#7EC8E3', amber: '#FF6B35', red: '#FF4444', grey: '#C4CAD6' }[s] || '#C4CAD6';
}

function fillClass(pct) {
  if (pct >= 70) return 'green';
  if (pct >= 40) return 'amber';
  if (pct > 0)   return 'red';
  return 'grey';
}

function fmtDate(ts) {
  if (!ts) return 'Sin actualizar';
  const d = new Date(ts);
  const pad = n => String(n).padStart(2,'0');
  return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function renderSignals() {
  const signals = [];

  DATA.areas.forEach(a => {
    const pct = areaProgress(a);
    if (pct === 0) {
      signals.push({ icon: '○', text: `<strong>${a.name}</strong> — sin datos registrados todavía. Pendiente de primera actualización por ${a.owner}.` });
    }
    a.krs.forEach(kr => {
      if (kr.status === 'red' && kr.progress > 0) {
        signals.push({ icon: '⚠', text: `<strong>${kr.id} · ${a.name}</strong> — fuera de objetivo. Requiere atención.` });
      }
      if (kr.status === 'amber') {
        signals.push({ icon: '◐', text: `<strong>${kr.id} · ${a.name}</strong> — en riesgo. Revisar en próximo check semanal.` });
      }
    });
    if (!a.lastUpdate) {
      // already covered above
    }
  });

  if (signals.length === 0) {
    signals.push({ icon: '✓', text: 'Sin señales de alerta activas. Todos los KRs en seguimiento.' });
  }

  document.getElementById('signalList').innerHTML = signals.map(s => `
    <div class="signal-item">
      <span class="signal-icon">${s.icon}</span>
      <span class="signal-text">${s.text}</span>

}

function calcGroupedYesnoResult(kr) {
  const allItems = kr.groups.flatMap(g => g.items);
  const answered = allItems.filter(i => i.value !== null);
  const withIssues = allItems.filter(i => i.value === true).length; // Sí = tiene incidencias
  const total = allItems.length;
  // Progress = % sin incidencias (No = bueno aquí)
  const clean = allItems.filter(i => i.value === false).length;
  const pct = answered.length === 0 ? 0 : Math.round((clean / total) * 100);
  const col = pct >= 80 ? '#34D399' : pct >= 50 ? 'var(--warn)' : 'var(--risk)';
  document.getElementById('groupedYesnoResult').innerHTML =
    `<span style="color:${col};font-family:var(--font-display);font-size:12px">${clean}/${total} tipos sin incidencias → ${pct}% limpio${withIssues > 0 ? ' · ⚠ '+withIssues+' con problemas' : ' ✓'}</span>`;
  document.getElementById('groupedYesnoResult')._pct = pct;
  document.getElementById('groupedYesnoResult')._status = pct >= 80 ? 'green' : pct >= 50 ? 'amber' : 'red';
}

    };

function updateScoreResult(val, target) {
  const pct = Math.min(100, Math.round((val / target) * 100));
  const status = val >= target ? 'En objetivo ✓' : val >= target * 0.75 ? 'En riesgo' : 'Fuera de objetivo';
  const col = val >= target ? 'var(--accent)' : val >= target * 0.75 ? 'var(--warn)' : 'var(--risk)';
  document.getElementById('scoreResult').innerHTML =
    `<span style="color:${col};font-family:var(--font-display);font-size:12px">${val}/10 → ${pct}% del objetivo · ${status}</span>`;
  document.getElementById('scoreResult')._pct = pct;
  document.getElementById('scoreResult')._status = val >= target ? 'green' : val >= target * 0.75 ? 'amber' : 'red';
}

function updateRatioResult(a, b, target) {
  if (!b || b === 0) return;
  const ratio = (a / b) * 100;
  const pct = Math.max(0, Math.round(100 - ((ratio / target) * 100)));
  const ok = ratio <= target;
  const col = ok ? 'var(--ok)' : ratio <= target * 1.5 ? 'var(--warn)' : 'var(--risk)';
  document.getElementById('ratioResult').innerHTML =
    `<span style="color:${col};font-family:var(--font-display);font-size:12px">${a} de ${b} → ${ratio.toFixed(1)}% ${ok ? '✓ Dentro del objetivo (<'+target+'%)' : '⚠ Supera el objetivo ('+target+'%)'}</span>`;
  document.getElementById('ratioResult')._pct = ok ? 100 : Math.max(0, pct);
  document.getElementById('ratioResult')._status = ok ? 'green' : ratio <= target * 1.5 ? 'amber' : 'red';
}

function updateSaturationResult(val, target) {
  const ok = val <= target;
  const pct = ok ? Math.round(100 - ((val / target) * 50)) : Math.max(0, Math.round(100 - ((val - target) * 5)));
  const col = ok ? 'var(--ok)' : val <= target * 1.1 ? 'var(--warn)' : 'var(--risk)';
  document.getElementById('saturationResult').innerHTML =
    `<span style="color:${col};font-family:var(--font-display);font-size:12px">${val}% ocupación ${ok ? '✓ Dentro del objetivo (≤'+target+'%)' : '⚠ Supera el límite ('+target+'%)'}</span>`;
  document.getElementById('saturationResult')._pct = Math.min(100, Math.max(0, ok ? 100 : Math.round(((target / val) * 80))));
  document.getElementById('saturationResult')._status = ok ? 'green' : val <= target * 1.1 ? 'amber' : 'red';
}

// ── GROUPED RANKING (R1 — margen por línea de negocio) ───────────────────
function calcGroupedRankingResult(kr) {
  const answered = kr.groups.filter(g => g.selected != null);
  if (answered.length === 0) {
    document.getElementById('groupedRankingResult').innerHTML = '';
    document.getElementById('groupedRankingResult')._pct = null;
    return;
  }
  const avgPct = Math.round(answered.reduce((s, g) => s + kr.options[g.selected].pct, 0) / answered.length);
  const worstStatus = answered.some(g => kr.options[g.selected].status === 'red') ? 'red'
                     : answered.some(g => kr.options[g.selected].status === 'amber') ? 'amber' : 'green';
  const col = worstStatus === 'green' ? '#34D399' : worstStatus === 'amber' ? 'var(--warn)' : 'var(--risk)';
  document.getElementById('groupedRankingResult').innerHTML =
    `<span style="color:${col};font-family:var(--font-display);font-size:12px">${answered.length}/${kr.groups.length} líneas evaluadas → media ${avgPct}%${worstStatus !== 'green' ? ' · ⚠ alguna línea por debajo del objetivo' : ' ✓'}</span>`;
  document.getElementById('groupedRankingResult')._pct = avgPct;
  document.getElementById('groupedRankingResult')._status = worstStatus;
}

function buildGroupedRanking(kr) {
  const container = document.getElementById('groupedRankingItems');
  container.innerHTML = '';
  kr.groups.forEach((group, gi) => {
    const block = document.createElement('div');
    block.className = 'group-ranking-block';
    const label = document.createElement('div');
    label.className = 'group-ranking-label';
    label.textContent = group.label;
    block.appendChild(label);

    kr.options.forEach((opt, oi) => {
      const colorClass = opt.status === 'green' ? 'best' : opt.status === 'amber' ? 'mid' : 'worst';
      const isActive = group.selected === oi;
      const div = document.createElement('div');
      div.className = `ranking-option${isActive ? ' active ' + colorClass : ''}`;
      div.innerHTML = `<span class="ranking-label">${opt.label}</span><span class="ranking-check">✓</span>`;
      div.onclick = () => {
        group.selected = oi;
        buildGroupedRanking(kr);
        calcGroupedRankingResult(kr);
      };
      block.appendChild(div);
    });
    container.appendChild(block);
  });
  calcGroupedRankingResult(kr);
}

// ── SINGLE YESNO (R2 Holded, N2 concentración cliente) ────────────────────
function buildSingleYesno(kr) {
  document.getElementById('singleYesnoLabel').textContent = kr.yesnoQuestion || '¿Lo estamos aplicando?';
  const toggle = document.getElementById('singleYesnoToggle');
  toggle.innerHTML = `
    <button type="button" class="toggle-btn yes ${kr.value === true ? 'active' : ''}" data-val="true">Sí</button>
    <button type="button" class="toggle-btn no ${kr.value === false ? 'active' : ''}" data-val="false">No</button>`;
  toggle.querySelectorAll('.toggle-btn').forEach(btn => {
    btn.onclick = () => {
      kr.value = btn.dataset.val === 'true';
      toggle.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      updateSingleYesnoResult(kr);
    };
  });
  updateSingleYesnoResult(kr);
}

function updateSingleYesnoResult(kr) {
  if (kr.value === null) {
    document.getElementById('singleYesnoResult').innerHTML = '';
    document.getElementById('singleYesnoResult')._pct = null;
    return;
  }
  const pct = kr.value ? 100 : 0;
  const col = kr.value ? '#34D399' : 'var(--risk)';
  document.getElementById('singleYesnoResult').innerHTML =
    `<span style="color:${col};font-family:var(--font-display);font-size:12px">${kr.value ? 'Sí' : 'No'} → ${pct}%</span>`;
  document.getElementById('singleYesnoResult')._pct = pct;
  document.getElementById('singleYesnoResult')._status = kr.value ? 'green' : 'red';
}

// ── MONTHS YESNO (N3 — clientes nuevos por mes) ────────────────────────────
function calcMonthsYesnoResult(items) {
  const answered = items.filter(i => i.value !== null);
  const yesCount = items.filter(i => i.value === true).length;
  const pct = answered.length === 0 ? 0 : Math.round((yesCount / items.length) * 100);
  const col = pct >= 80 ? '#34D399' : pct >= 50 ? 'var(--warn)' : 'var(--risk)';
  document.getElementById('monthsYesnoResult').innerHTML =
    `<span style="color:${col};font-family:var(--font-display);font-size:12px">${yesCount}/12 meses cumplidos → ${pct}%</span>`;
  document.getElementById('monthsYesnoResult')._pct = pct;
  document.getElementById('monthsYesnoResult')._status = pct >= 80 ? 'green' : pct >= 50 ? 'amber' : 'red';
}

function buildMonthsYesno(kr) {
  document.getElementById('monthsYesnoLabel').textContent = kr.yesnoLabel || 'Marca Sí/No por mes';
  const container = document.getElementById('monthsYesnoItems');
  container.innerHTML = '';
  kr.items.forEach((item, idx) => {
    const row = document.createElement('div');
    row.className = 'check-row';
    row.style.gridTemplateColumns = '1fr auto';
    row.innerHTML = `
      <span class="check-label">${item.label}</span>
      <div class="check-toggle">
        <button type="button" class="toggle-btn yes ${item.value === true ? 'active' : ''}" data-idx="${idx}" data-val="true">Sí</button>
        <button type="button" class="toggle-btn no ${item.value === false ? 'active' : ''}" data-idx="${idx}" data-val="false">No</button>
      </div>`;
    container.appendChild(row);
  });
  container.querySelectorAll('.toggle-btn').forEach(btn => {
    btn.onclick = () => {
      const idx = parseInt(btn.dataset.idx);
      kr.items[idx].value = btn.dataset.val === 'true';
      container.querySelectorAll(`.toggle-btn[data-idx="${idx}"]`).forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      calcMonthsYesnoResult(kr.items);
    };
  });
  calcMonthsYesnoResult(kr.items);
}

function openModal(areaId, krId) {
  const area = DATA.areas.find(a => a.id === areaId);
  const kr = area.krs.find(k => k.id === krId);
  _editTarget = { areaId, krId };

  document.getElementById('modalTitle').textContent = `ACTUALIZAR · ${krId}`;
  document.getElementById('modalHint').textContent = kr.hint || '';
  document.getElementById('modalNote').value = '';
  document.getElementById('modalStatus').value = kr.status;

  hideAllModalFields();

  if (kr.inputType === 'grouped_ranking') {
    document.getElementById('fieldGroupedRanking').style.display = 'block';
    buildGroupedRanking(kr);
  } else if (kr.inputType === 'single_yesno') {
    document.getElementById('fieldSingleYesno').style.display = 'block';
    buildSingleYesno(kr);
  } else if (kr.inputType === 'months_yesno') {
    document.getElementById('fieldMonthsYesno').style.display = 'block';
    buildMonthsYesno(kr);
  } else if (kr.inputType === 'ranking') {
    document.getElementById('fieldRanking').style.display = 'block';
    buildRanking(kr);
  } else if (kr.inputType === 'grouped_yesno') {
    document.getElementById('fieldGroupedYesno').style.display = 'block';
    buildGroupedYesno(kr);
  } else if (kr.inputType === 'checklist') {
    document.getElementById('fieldChecklist').style.display = 'block';
    buildChecklist(kr);
  } else if (kr.inputType === 'yesno') {
    document.getElementById('fieldYesno').style.display = 'block';
    buildYesno(kr);
  } else if (kr.inputType === 'score_10') {
    document.getElementById('fieldScore').style.display = 'block';
    buildScoreSelector(kr.value, kr.target);
  } else if (kr.inputType === 'ratio') {
    document.getElementById('fieldRatio').style.display = 'block';
    document.getElementById('ratioA').value = kr.valueA || '';
    document.getElementById('ratioB').value = kr.valueB || '';
    document.getElementById('ratioResult').innerHTML = '';
    document.getElementById('ratioA').oninput = () => {
      const a = parseInt(document.getElementById('ratioA').value) || 0;
      const b = parseInt(document.getElementById('ratioB').value) || 0;
      if (b > 0) updateRatioResult(a, b, kr.target);
    };
    document.getElementById('ratioB').oninput = () => {
      const a = parseInt(document.getElementById('ratioA').value) || 0;
      const b = parseInt(document.getElementById('ratioB').value) || 0;
      if (b > 0) updateRatioResult(a, b, kr.target);
    };
    if (kr.valueA != null && kr.valueB) updateRatioResult(kr.valueA, kr.valueB, kr.target);
  } else if (kr.inputType === 'saturation') {
    document.getElementById('fieldSaturation').style.display = 'block';
    document.getElementById('saturationVal').value = kr.value || '';
    document.getElementById('saturationResult').innerHTML = '';
    document.getElementById('saturationVal').oninput = () => {
      const v = parseInt(document.getElementById('saturationVal').value) || 0;
      updateSaturationResult(v, kr.target);
    };
    if (kr.value != null) updateSaturationResult(kr.value, kr.target);
  } else {
    document.getElementById('fieldPercent').style.display = 'block';
    document.getElementById('modalProgress').value = kr.progress;
  }

  document.getElementById('modalOverlay').classList.add('open');
}

document.getElementById('modalCancel').onclick = () => {
  document.getElementById('modalOverlay').classList.remove('open');
};

document.getElementById('modalOverlay').onclick = (e) => {
  if (e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('open');
  }
};

document.getElementById('modalSave').onclick = async () => {
  if (!_editTarget) return;
  const { areaId, krId } = _editTarget;
  const area = DATA.areas.find(a => a.id === areaId);
  const kr = area.krs.find(k => k.id === krId);
  const newNote = document.getElementById('modalNote').value.trim();

  if (kr.inputType === 'grouped_ranking') {
    const res = document.getElementById('groupedRankingResult');
    kr.progress = res._pct != null ? res._pct : kr.progress;
    kr.status = res._status || 'grey';
  } else if (kr.inputType === 'single_yesno') {
    const res = document.getElementById('singleYesnoResult');
    kr.progress = res._pct != null ? res._pct : kr.progress;
    kr.status = res._status || 'grey';
  } else if (kr.inputType === 'months_yesno') {
    const res = document.getElementById('monthsYesnoResult');
    kr.progress = res._pct != null ? res._pct : kr.progress;
    kr.status = res._status || 'grey';
  } else if (kr.inputType === 'ranking') {
    const res = document.getElementById('rankingResult');
    kr.progress = res._pct != null ? res._pct : kr.progress;
    kr.status = res._status || 'grey';
  } else if (kr.inputType === 'grouped_yesno') {
    const res = document.getElementById('groupedYesnoResult');
    kr.progress = res._pct != null ? res._pct : kr.progress;
    kr.status = res._status || 'grey';
  } else if (kr.inputType === 'checklist') {
    const res = document.getElementById('checklistResult');
    kr.progress = res._pct != null ? res._pct : kr.progress;
    kr.status = res._status || 'grey';
  } else if (kr.inputType === 'yesno') {
    const res = document.getElementById('yesnoResult');
    kr.progress = res._pct != null ? res._pct : kr.progress;
    kr.status = res._status || 'grey';
  } else if (kr.inputType === 'score_10') {
    const active = document.querySelector('.score-btn.active');
    if (active) {
      const val = parseInt(active.textContent);
      kr.value = val;
      const res = document.getElementById('scoreResult');
      kr.progress = res._pct || Math.min(100, Math.round((val / kr.target) * 100));
      kr.status = res._status || (val >= kr.target ? 'green' : val >= kr.target * 0.75 ? 'amber' : 'red');
    }
  } else if (kr.inputType === 'ratio') {
    const a = parseInt(document.getElementById('ratioA').value) || 0;
    const b = parseInt(document.getElementById('ratioB').value) || 0;
    if (b > 0) {
      kr.valueA = a; kr.valueB = b;
      const res = document.getElementById('ratioResult');
      kr.progress = res._pct != null ? res._pct : kr.progress;
      kr.status = res._status || document.getElementById('modalStatus').value;
    }
  } else if (kr.inputType === 'saturation') {
    const v = parseInt(document.getElementById('saturationVal').value) || 0;
    kr.value = v;
    const res = document.getElementById('saturationResult');
    kr.progress = res._pct != null ? res._pct : kr.progress;
    kr.status = res._status || document.getElementById('modalStatus').value;
  } else {
    kr.progress = Math.min(100, Math.max(0, parseInt(document.getElementById('modalProgress').value) || 0));
    kr.status = document.getElementById('modalStatus').value;
  }

  if (newNote) {
    const now = new Date();
    const pad = n => String(n).padStart(2,'0');
    kr.notes.push({ ts: `${pad(now.getDate())}/${pad(now.getMonth()+1)}`, text: newNote });
  }
  area.lastUpdate = Date.now();

  await saveData(DATA);
  document.getElementById('modalOverlay').classList.remove('open');
};

// ─── MAIN RENDER ─────────────────────────────────
function render() {
  renderSummary();
  renderAreas();
  renderSignals();
}

function startApp() {
  if (window.__firebase) {
    initFirebaseSync();
  } else {
    // Wait for the module script to finish loading Firebase
    let started = false;
    window.addEventListener('firebase-ready', () => {
      if (started) return;
      started = true;
      initFirebaseSync();
    });
    // Fallback: if Firebase fails to load (network/CDN blocked), work offline after 4s
    setTimeout(() => {
      if (started) return;
      started = true;
      const cached = loadLocalCache();
      if (cached) applyIncomingData(cached); else render();
      updateSyncIndicator('offline');
    }, 4000);
  }
}

startApp();
</script>
